name: Build Studio Multi-Project

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/supabase-studio-multi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Add swap (8GB) to avoid OOM during Next.js build
        run: |
          sudo swapoff -a || true
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Shallow clone supabase/supabase (full, depth=1)
        run: git clone --depth=1 https://github.com/supabase/supabase.git supabase-src

      - name: Create empty patches dir if missing
        run: mkdir -p supabase-src/patches

      - name: Apply our source patches
        run: cp -rv patches-repo/patches/. supabase-src/

      - name: Set up QEMU (for arm64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: supabase-src
          file: supabase-src/apps/studio/Dockerfile
          build-args: |
            NEXT_PUBLIC_IS_PLATFORM=false
            PATCHES_HASH=${{ hashFiles('patches-repo/patches/**') }}
          target: production
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
